# argocd-proxy — Kubernetes manifests.
#
# A Deployment (NOT a StatefulSet): the proxy's only state is an in-memory
# informer mirror of Application objects, rebuilt from the Kubernetes API on
# startup. There is no persistent storage and no need for stable pod identity,
# so replicas are interchangeable and scale horizontally.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-proxy
  namespace: argocd
---
# The informer is namespaced to --namespace, and the RBAC ConfigMap is read from
# the same namespace, so a namespaced Role is sufficient. If you run ArgoCD with
# "applications in any namespace", replace this Role/RoleBinding with a
# ClusterRole/ClusterRoleBinding granting the same verbs cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-proxy
  namespace: argocd
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-proxy
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-proxy
subjects:
- kind: ServiceAccount
  name: argocd-proxy
  namespace: argocd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-proxy
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-proxy
spec:
  # Stateless from an ops standpoint — scale out for throughput/HA. Each replica
  # holds its own in-memory mirror and watch.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-proxy
    spec:
      serviceAccountName: argocd-proxy
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: argocd-proxy
        image: ghcr.io/hsiaoairplane/argocd-proxy:latest
        args:
        - --proxy-backend=http://argocd-server
        - --namespace=argocd
        - --rbac-configmap=argocd-rbac-cm
        - --listen-addr=:8081
        - --resync-period=30m
        ports:
        - name: http
          containerPort: 8081
        # The HTTP server only starts after the informer cache has synced, so a
        # startupProbe covers a potentially long initial LIST at large app
        # counts; liveness/readiness take over once it passes.
        startupProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 5
          failureThreshold: 60
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          periodSeconds: 20
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            # The informer cache grows with the Application count; raise this for
            # very large instances (tens of thousands of apps).
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-proxy
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-proxy
spec:
  selector:
    app.kubernetes.io/name: argocd-proxy
  ports:
  - name: http
    port: 8081
    targetPort: http
